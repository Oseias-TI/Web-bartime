services:
  postgres-db:
    image: postgres:16-alpine
    container_name: bartime_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - bartime_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bartime_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bartime_api
    restart: unless-stopped
    ports:
      - "${PORT:-3333}:3333"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - bartime_net
    volumes:
      - bartime_backups:/backups
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 512M

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bartime_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - bartime_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - bartime_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: bartime_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bartime_redis:/data
    networks:
      - bartime_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: bartime_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - bartime_elasticsearch:/usr/share/elasticsearch/data
    networks:
      - bartime_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  kibana:
    image: kibana:8.10.2
    container_name: bartime_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - bartime_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: bartime_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - bartime_prometheus:/prometheus
    networks:
      - bartime_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:10.1.5
    container_name: bartime_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - bartime_grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - bartime_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  bartime_pgdata:
    driver: local
  bartime_pgadmin:
    driver: local
  bartime_backups:
    driver: local
  bartime_redis:
    driver: local
  bartime_elasticsearch:
    driver: local
  bartime_prometheus:
    driver: local
  bartime_grafana:
    driver: local

networks:
  bartime_net:
    driver: bridge
